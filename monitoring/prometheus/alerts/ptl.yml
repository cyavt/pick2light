groups:
  - name: ptl-alerts
    rules:
      - alert: DevicesOfflineHigh
        expr: (count(ptl_device_status{status="offline"}) / 1000) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Hơn 10% thiết bị offline ({{ $value | humanizePercentage }})"

      - alert: MQTTBrokerDown
        expr: up{job="emqx"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "EMQX broker không phản hồi"

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API latency p95 > 500ms"

      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter không phản hồi"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter không phản hồi"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 90%"
