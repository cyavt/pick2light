global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ptl-services"
    static_configs:
      - targets:
          - "auth-service:8001"
          - "core-api:8002"
          - "ws-service:8003"
          - "mqtt-bridge:8004"

  - job_name: "emqx"
    static_configs:
      - targets: ["emqx:18083"]
    metrics_path: /api/v5/prometheus/stats
    basic_auth:
      username: admin
      password: ${EMQX_PASSWORD}

  - job_name: "postgres"
    static_configs:
      - targets: ["pg-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/alerts/*.yml"
