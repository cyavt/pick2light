---
# Authelia Users Database
# Password hash generated with: docker run --rm authelia/authelia:4 authelia crypto hash generate argon2 --password 'your_password'

users:
  admin:
    displayname: "PTL Admin"
    # password: admin (change this!)
    password: "$argon2id$v=19$m=65536,t=3,p=4$REPLACE_WITH_REAL_HASH"
    email: admin@yourdomain.com
    groups:
      - admin
      - devops

  devops:
    displayname: "DevOps Engineer"
    password: "$argon2id$v=19$m=65536,t=3,p=4$REPLACE_WITH_REAL_HASH"
    email: devops@yourdomain.com
    groups:
      - devops
