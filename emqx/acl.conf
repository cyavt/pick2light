%%
%% EMQX ACL Rules for Pick-to-Light System
%%
%% Each ESP32 device can only publish/subscribe to its own topics.
%% mqtt-bridge has full access to all ptl/ topics.
%%

%% ─── mqtt-bridge: full access ───────────────────────────────
{allow, {user, "mqtt-bridge"}, all, ["ptl/#"]}.

%% ─── ESP32 devices: restricted per device ────────────────────
%% Device can subscribe to its own command topic
{allow, all, subscribe, ["ptl/device/${zone_id}/${client_id}/cmd"]}.

%% Device can publish to its own event and status topics
{allow, all, publish, ["ptl/device/${zone_id}/${client_id}/event"]}.
{allow, all, publish, ["ptl/device/${zone_id}/${client_id}/status"]}.

%% Device can subscribe to zone-wide commands
{allow, all, subscribe, ["ptl/zone/${zone_id}/cmd"]}.

%% ─── Deny everything else ───────────────────────────────────
{deny, all}.
